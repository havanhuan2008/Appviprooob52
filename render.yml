services:
  - type: web
    name: vip-license-portal-v4
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: APP_BASE_URL
        sync: false
      - key: LINK4M_API_TOKEN
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FREE_KEY_TTL_HOURS
        value: 5
      - key: LINK_SESSION_TTL_MINUTES
        value: 30
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TGBOT_LOGIN_PASSWORD
        sync: false
      - key: TG_ADMIN_IDS
        sync: false
